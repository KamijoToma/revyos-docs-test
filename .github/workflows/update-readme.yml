name: Update README

on:
  push:
    paths:
    - 'docs/index.en.md'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout revyos/revyos repository
      uses: actions/checkout@v2
      with:
        repository: revyos/docs
        path: revyos

    - name: Replace relative links in README.md
      run: |
        sed -i -E 's|(\[.*\])\(([^:]*)\)|\1(https://github.com/revyos/docs/blob/master/docs/\2)|g' revyos/docs/index.en.md

    - name: Copy to destination repository
      uses: andstor/copycat-action@v3
      with:
        personal_token: ${{ secrets.ACCESS_TOKEN }}
        src_path: ../revyos/docs/index.en.md
        dst_path: profile/README.md
        dst_owner: KamijoToma
        dst_repo_name: revyos-github