site_name: RevyOS Docs
repo_name: revyos/docs
repo_url: https://github.com/revyos/docs
default_language: zh-CN
default_language_only: true
theme:
  name: material
  features:
    - navigation.tabs # 栏头加标签（一级导航）
    - navigation.tabs.sticky # 固定（浏览时不收起）标签
  highlightjs: true
  hljs_languages:
    - bash
    - python
    - c
    - cpp

extra_javascript:
  - 'https://cdnjs.loli.net/ajax/libs/pangu/4.0.7/pangu.min.js' # Pangu.js
  - '_static/js/extra.js'

plugins:
  - i18n:
      default_language: zh
      languages:
        en:
          name: English
          build: true
        zh:
          name: 简体中文
          build: true
      material_alternate: true
      nav_translations:
        en:
          主页: Home

nav:
  - 主页: index.md